services:
  easygs:
    image: easygs:analysis
    build:
      context: ..
      dockerfile: container/Dockerfile
    network_mode: host
    environment:
      EASYGS_AGENTS__DEFAULTS__MODEL: ${EASYGS_MODEL:-deepseek-v4-pro}
      EASYGS_PROVIDERS__CUSTOM__API_KEY: ${CUSTOM_API_KEY:-}
      EASYGS_PROVIDERS__CUSTOM__API_BASE: ${CUSTOM_API_BASE:-}
      EASYGS_PROVIDERS__ANTHROPIC__API_KEY: ${ANTHROPIC_API_KEY:-}
      EASYGS_PROVIDERS__ANTHROPIC__API_BASE: ${ANTHROPIC_API_BASE:-}
      EASYGS_PROVIDERS__OPENAI__API_KEY: ${OPENAI_API_KEY:-}
      EASYGS_PROVIDERS__OPENAI__API_BASE: ${OPENAI_API_BASE:-}
      EASYGS_PROVIDERS__OPENROUTER__API_KEY: ${OPENROUTER_API_KEY:-}
      EASYGS_PROVIDERS__OPENROUTER__API_BASE: ${OPENROUTER_API_BASE:-}
      EASYGS_PROVIDERS__DEEPSEEK__API_KEY: ${DEEPSEEK_API_KEY:-}
      EASYGS_PROVIDERS__DEEPSEEK__API_BASE: ${DEEPSEEK_API_BASE:-}
      EASYGS_PROVIDERS__GROQ__API_KEY: ${GROQ_API_KEY:-}
      EASYGS_PROVIDERS__GROQ__API_BASE: ${GROQ_API_BASE:-}
      EASYGS_PROVIDERS__ZHIPU__API_KEY: ${ZHIPU_API_KEY:-}
      EASYGS_PROVIDERS__ZHIPU__API_BASE: ${ZHIPU_API_BASE:-}
      EASYGS_PROVIDERS__DASHSCOPE__API_KEY: ${DASHSCOPE_API_KEY:-}
      EASYGS_PROVIDERS__DASHSCOPE__API_BASE: ${DASHSCOPE_API_BASE:-}
      EASYGS_PROVIDERS__VLLM__API_KEY: ${VLLM_API_KEY:-}
      EASYGS_PROVIDERS__VLLM__API_BASE: ${VLLM_API_BASE:-}
      EASYGS_PROVIDERS__GEMINI__API_KEY: ${GEMINI_API_KEY:-}
      EASYGS_PROVIDERS__GEMINI__API_BASE: ${GEMINI_API_BASE:-}
      EASYGS_PROVIDERS__MOONSHOT__API_KEY: ${MOONSHOT_API_KEY:-}
      EASYGS_PROVIDERS__MOONSHOT__API_BASE: ${MOONSHOT_API_BASE:-}
      EASYGS_PROVIDERS__STEPFUN__API_KEY: ${STEPFUN_API_KEY:-}
      EASYGS_PROVIDERS__STEPFUN__API_BASE: ${STEPFUN_API_BASE:-}
      EASYGS_PROVIDERS__MINIMAX__API_KEY: ${MINIMAX_API_KEY:-}
      EASYGS_PROVIDERS__MINIMAX__API_BASE: ${MINIMAX_API_BASE:-}
      EASYGS_PROVIDERS__AIHUBMIX__API_KEY: ${AIHUBMIX_API_KEY:-}
      EASYGS_PROVIDERS__AIHUBMIX__API_BASE: ${AIHUBMIX_API_BASE:-}
      EASYGS_CHANNELS__FEISHU__ENABLED: "${FEISHU_ENABLED:-false}"
      EASYGS_CHANNELS__FEISHU__APP_ID: ${FEISHU_APP_ID:-}
      EASYGS_CHANNELS__FEISHU__APP_SECRET: ${FEISHU_APP_SECRET:-}
      EASYGS_CHANNELS__FEISHU__ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      EASYGS_CHANNELS__FEISHU__VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      EASYGS_CHANNELS__FEISHU__ALLOW_FROM: "${FEISHU_ALLOW_FROM:-[]}"
      EASYGS_EMAIL_ONLY_NOTIFY__ENABLED: "${EMAIL_NOTIFY_ENABLED:-false}"
      EASYGS_EMAIL_ONLY_NOTIFY__SMTP_HOST: ${EMAIL_NOTIFY_SMTP_HOST:-}
      EASYGS_EMAIL_ONLY_NOTIFY__SMTP_PORT: "${EMAIL_NOTIFY_SMTP_PORT:-587}"
      EASYGS_EMAIL_ONLY_NOTIFY__SMTP_USERNAME: ${EMAIL_NOTIFY_SMTP_USERNAME:-}
      EASYGS_EMAIL_ONLY_NOTIFY__SMTP_PASSWORD: ${EMAIL_NOTIFY_SMTP_PASSWORD:-}
      EASYGS_EMAIL_ONLY_NOTIFY__SMTP_USE_TLS: "${EMAIL_NOTIFY_SMTP_USE_TLS:-true}"
      EASYGS_EMAIL_ONLY_NOTIFY__SMTP_USE_SSL: "${EMAIL_NOTIFY_SMTP_USE_SSL:-false}"
      EASYGS_EMAIL_ONLY_NOTIFY__FROM_ADDRESS: ${EMAIL_NOTIFY_FROM_ADDRESS:-}
      EASYGS_EMAIL_ONLY_NOTIFY__TO_ADDRESS: ${EMAIL_NOTIFY_TO_ADDRESS:-}
    volumes:
      - ${EASYGS_HOME_DIR:?Set EASYGS_HOME_DIR to a host directory for EasyGS config, workspace, and resources}:/home/easygs/.easygs
      - ${EASYGS_DATA_DIR:?Set EASYGS_DATA_DIR to a host data directory}:/data
    restart: unless-stopped
